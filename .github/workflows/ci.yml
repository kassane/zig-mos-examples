name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sdk_archive: llvm-mos-linux.tar.xz
            zig_archive: zig-mos-x86_64-linux-musl-baseline.tar.xz
            zig_dir: zig-mos-x86_64-linux-musl-baseline
          # - os: macos-latest
          #   sdk_archive: llvm-mos-macos.tar.xz
          #   zig_archive: zig-mos-aarch64-macos-apple_m1.tar.xz
          #   zig_dir: zig-mos-aarch64-macos-apple_m1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download toolchain and SDK
        env:
          SDK_ARCHIVE: ${{ matrix.sdk_archive }}
          ZIG_ARCHIVE: ${{ matrix.zig_archive }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        run: |
          curl -fsSL -O "https://github.com/llvm-mos/llvm-mos-sdk/releases/download/v23.0.0/${SDK_ARCHIVE}"
          curl -fsSL -O "https://github.com/kassane/zig-mos-bootstrap/releases/download/0.17.0-dev/${ZIG_ARCHIVE}"
          tar -xf "${SDK_ARCHIVE}"
          tar -xf "${ZIG_ARCHIVE}"
          echo "$PWD/${ZIG_DIR}" >> "$GITHUB_PATH"

      - name: Build NES examples and generate Mesen label files
        run: zig build nes-hello1 nes-hello2 nes-hello3 nes-zig-logo gen-labels -Dsdk="$PWD/llvm-mos" --summary all

      - name: Build C64 examples
        run: zig build c64-hello c64-fibonacci -Dsdk="$PWD/llvm-mos" --summary all

      - name: Build Neo6502 example
        run: zig build neo6502-graphics -Dsdk="$PWD/llvm-mos" --summary all

      - name: Verify outputs
        run: ls -la zig-out/bin/
