name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            zig_archive: zig-mos-x86_64-linux-musl-baseline.tar.xz
            zig_dir: zig-mos-x86_64-linux-musl-baseline
          - os: macos-latest
            name: macOS aarch64
            zig_archive: zig-mos-aarch64-macos-baseline.tar.xz
            zig_dir: zig-mos-aarch64-macos-baseline
          - os: ubuntu-24.04-arm
            name: Linux aarch64
            zig_archive: zig-mos-aarch64-linux-musl-baseline.tar.xz
            zig_dir: zig-mos-aarch64-linux-musl-baseline
          - os: windows-latest
            name: Windows x86_64
            zig_archive: zig-mos-x86_64-windows-baseline.zip
            zig_dir: zig-mos-x86_64-windows-baseline
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@main

      - name: Cache zig-mos toolchain
        id: cache-zig
        uses: actions/cache@main
        with:
          path: ${{ matrix.zig_dir }}
          key: zig-mos-${{ matrix.zig_archive }}-v1

      - name: Download zig-mos toolchain
        if: steps.cache-zig.outputs.cache-hit != 'true'
        env:
          ZIG_ARCHIVE: ${{ matrix.zig_archive }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        run: |
          curl -fsSL -O "https://github.com/kassane/zig-mos-bootstrap/releases/download/0.17.0-dev/${ZIG_ARCHIVE}"
          if [[ "${ZIG_ARCHIVE}" == *.zip ]]; then unzip -q "${ZIG_ARCHIVE}"; else tar -xf "${ZIG_ARCHIVE}"; fi

      - name: Add zig-mos to PATH
        env:
          ZIG_DIR: ${{ matrix.zig_dir }}
        run: echo "$PWD/${ZIG_DIR}" >> "$GITHUB_PATH"

      - name: Build SDK platform libs from source
        run: zig build sdk-build --summary all

      - name: Build all
        run: zig build --summary all

      - name: Build NES gen-labals
        run: zig build gen-labels --summary all

      - name: Run MOS-SIM tests
        run: |
            zig build run-sim-hello
            zig build run-sim-addrspace-test

      - name: Verify outputs
        run: |
          zig build check-outputs --summary all
          ls -la zig-out/bin/
          for f in \
            hello1.nes hello2.nes hello3.nes zig-logo.nes fade.nes sprites.nes random.nes pads.nes color-cycle.nes \
            fullbg.nes mappers.nes bat-ball.nes megablast.nes gg-demo.nes \
            cnrom-hello.nes cnrom-sprites.nes \
            unrom-hello.nes unrom-512-hello.nes unrom-color-cycle.nes \
            mmc1-hello.nes mmc1-sprites.nes \
            mmc3-hello.nes mmc3-pads.nes \
            gtrom-hello.nes gtrom-color-cycle.nes \
            nesdoug-mmc3.nes full-game.nes \
            action53-hello.nes fds-hello.fds \
            c64-hello.prg fibonacci.prg plasma.prg \
            vic20-hello.prg \
            c128-hello.prg pet-hello.prg \
            cx16-hello.prg cx16-k-console-test.prg \
            geos-hello.cvt \
            supervision-hello.sv dodo-hello \
            osi-c1p-hello hello.com \
            lynx-hello.bll \
            colorbar.a26 colorbar-3e.a26 \
            atari8dos-hello.xex atari8-cart-hello.rom atari8-megacart-hello.rom atari8-xegs-hello.rom atari5200-cart-hello.rom \
            pce-color-cycle.pce pce-color-cycle-banked.pce \
            eater-hello-lcd.rom eater-asm-clobber.rom \
            mega65-hello.prg viciv.prg \
            graphics.neo \
            snes-hello.sfc snes-color-cycle.sfc snes-zig-logo.sfc snes-pi-test.sfc snes-pi-fastrom.sfc snes-hirom-hello.sfc snes-pads.sfc \
            hello.sys \
            sim-hello mos-sim; do
            test -f "zig-out/bin/$f" && echo "OK: $f" || echo "MISSING: $f"
          done

      - name: Upload built binaries
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@main
        with:
          name: zig-out-linux-x86_64
          path: zig-out/bin/
          retention-days: 1

  emulate:
    name: Emulator smoke tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@main
        with:
          name: zig-out-linux-x86_64
          path: zig-out/bin/

      - name: Install emulators
        run: |
          sudo apt-get update
          sudo apt-get install -y mednafen vice xvfb

      - name: NES / PC Engine / SNES smoke tests (mednafen)
        env:
          SDL_VIDEODRIVER: offscreen
          SDL_AUDIODRIVER: dummy
          HOME: /tmp/mednafen-home
        run: |
          mkdir -p /tmp/mednafen-home/.mednafen
          # Disable ALSA sound (no audio device in CI) to suppress init errors.
          echo "sound.device none" > /tmp/mednafen-home/.mednafen/mednafen.cfg
          smoke() {
            local f=$1 rc=0
            # Use || to prevent set -e from triggering on timeout's 124 exit code.
            timeout 3 mednafen "zig-out/bin/$f" || rc=$?
            if [ $rc -ne 0 ] && [ $rc -ne 124 ]; then
              echo "FAIL: $f (rc=$rc)"; exit 1
            fi
            echo "OK: $f"
          }
          # NES
          for f in hello1.nes hello2.nes hello3.nes zig-logo.nes fade.nes sprites.nes random.nes \
                   pads.nes color-cycle.nes fullbg.nes mappers.nes bat-ball.nes megablast.nes gg-demo.nes \
                   cnrom-hello.nes cnrom-sprites.nes \
                   unrom-hello.nes unrom-512-hello.nes unrom-color-cycle.nes \
                   mmc1-hello.nes mmc1-sprites.nes \
                   mmc3-hello.nes mmc3-pads.nes \
                   nesdoug-mmc3.nes full-game.nes; do
            smoke "$f"
          done
          # Note: gtrom-hello.nes / gtrom-color-cycle.nes (mapper 111) are NOT tested here —
          # apt mednafen lacks GTROM support. Both are covered by the emutest job (Mesen-X libretro core).
          # PC Engine
          for f in pce-color-cycle.pce pce-color-cycle-banked.pce; do
            smoke "$f"
          done
          # SNES (LoROM + FastROM + HiROM — mednafen detects map mode from header byte $FFD5)
          for f in snes-hello.sfc snes-color-cycle.sfc snes-zig-logo.sfc snes-pi-test.sfc snes-pi-fastrom.sfc snes-hirom-hello.sfc snes-pads.sfc; do
            smoke "$f"
          done
          # Note: Atari 2600 (.a26) is NOT tested here — apt mednafen lacks the vcs module.
          # Atari 2600 is covered by the emutest job (Stella2014 libretro core).

  build-test-tools:
    name: Build emutest + libretro cores
    runs-on: ubuntu-latest
    steps:
      - name: Cache test tools
        id: cache-tt
        uses: actions/cache@main
        with:
          path: tt/
          key: test-tools-v1

      - name: Set up Go
        if: steps.cache-tt.outputs.cache-hit != 'true'
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build emutest
        if: steps.cache-tt.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/sehugg/emutest
          cd emutest && go install
          mkdir -p ${{ github.workspace }}/tt/emutest
          cp "$(go env GOPATH)/bin/emutest" ${{ github.workspace }}/tt/emutest/

      - name: Build Stella2014 libretro core
        if: steps.cache-tt.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/libretro/stella2014-libretro
          cd stella2014-libretro && make --silent -j4
          mkdir -p ${{ github.workspace }}/tt/libretro
          mv stella2014_libretro.so ${{ github.workspace }}/tt/libretro/

      - name: Build Mesen-X libretro core
        if: steps.cache-tt.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/NovaSquirrel/Mesen-X
          cd Mesen-X/Libretro && make --silent -j4
          mkdir -p ${{ github.workspace }}/tt/libretro
          mv mesen_libretro.so ${{ github.workspace }}/tt/libretro/

      - name: Upload test tools
        uses: actions/upload-artifact@main
        with:
          name: test-tools
          path: tt/
          retention-days: 1

  emutest:
    name: Emutest screenshot tests
    runs-on: ubuntu-latest
    needs: [build, build-test-tools]
    steps:
      - uses: actions/checkout@main

      - name: Download built binaries
        uses: actions/download-artifact@main
        with:
          name: zig-out-linux-x86_64
          path: zig-out/bin/

      - name: Download test tools
        uses: actions/download-artifact@main
        with:
          name: test-tools
          path: tt/

      - name: Make emutest executable
        run: chmod +x tt/emutest/emutest

      - name: NES and Atari 2600 screenshot tests
        run: |
          run_emutest() {
            local f=$1 core=$2 rc=0
            tt/emutest/emutest -T \
              -L "tt/libretro/${core}" \
              -r "zig-out/bin/$f" \
              -t tools/emutest.lua || rc=$?
            # rc=0: TestPass, rc=1: TestFail, rc=2: indeterminate (demos have no test harness)
            if [ $rc -eq 1 ]; then echo "FAIL: $f"; exit 1; fi
            echo "OK: $f (rc=$rc)"
          }
          for f in hello1.nes hello2.nes hello3.nes zig-logo.nes fade.nes sprites.nes random.nes \
                   pads.nes color-cycle.nes fullbg.nes mappers.nes bat-ball.nes megablast.nes gg-demo.nes \
                   cnrom-hello.nes cnrom-sprites.nes \
                   unrom-hello.nes unrom-512-hello.nes unrom-color-cycle.nes \
                   mmc1-hello.nes mmc1-sprites.nes \
                   mmc3-hello.nes mmc3-pads.nes \
                   nesdoug-mmc3.nes full-game.nes \
                   gtrom-hello.nes gtrom-color-cycle.nes; do
            run_emutest "$f" mesen_libretro.so
          done
          for f in colorbar.a26 colorbar-3e.a26; do
            run_emutest "$f" stella2014_libretro.so
          done

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@main
        with:
          name: emutest-screenshots
          path: "*.png"
          if-no-files-found: ignore
