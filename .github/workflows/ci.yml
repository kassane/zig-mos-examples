name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            zig_archive: zig-mos-x86_64-linux-musl-baseline.tar.xz
            zig_dir: zig-mos-x86_64-linux-musl-baseline
          - os: macos-latest
            zig_archive: zig-mos-aarch64-macos-baseline.tar.xz
            zig_dir: zig-mos-aarch64-macos-baseline
          - os: ubuntu-24.04-arm
            zig_archive: zig-mos-aarch64-linux-musl-baseline.tar.xz
            zig_dir: zig-mos-aarch64-linux-musl-baseline
          - os: windows-latest
            zig_archive: zig-mos-x86_64-windows-baseline.zip
            zig_dir: zig-mos-x86_64-windows-baseline
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Download zig-mos toolchain
        env:
          ZIG_ARCHIVE: ${{ matrix.zig_archive }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        run: |
          curl -fsSL -O "https://github.com/kassane/zig-mos-bootstrap/releases/download/0.17.0-dev/${ZIG_ARCHIVE}"
          if [[ "${ZIG_ARCHIVE}" == *.zip ]]; then unzip -q "${ZIG_ARCHIVE}"; else tar -xf "${ZIG_ARCHIVE}"; fi
          echo "$PWD/${ZIG_DIR}" >> "$GITHUB_PATH"

      - name: Build SDK platform libs from source
        run: zig build sdk-build --summary all

      - name: Build NES examples and generate Mesen label files
        run: zig build nes-hello1 nes-hello2 nes-hello3 nes-zig-logo nes-fade nes-sprites nes-pads nes-color-cycle gen-labels --summary all

      - name: Build C64 examples
        run: zig build c64-hello c64-fibonacci c64-plasma --summary all


      - name: Build MEGA65 examples
        run: zig build mega65-hello mega65-plasma --summary all

      - name: Build Neo6502 example
        run: zig build neo6502-graphics --summary all

      - name: Build sim example
        run: zig build sim-hello --summary all

      - name: Verify outputs
        run: |
          ls -la zig-out/bin/
          for f in hello1.nes hello2.nes hello3.nes zig-logo.nes fade.nes sprites.nes pads.nes color-cycle.nes \
                   c64-hello.prg fibonacci.prg plasma.prg mega65-hello.prg graphics.neo sim-hello; do
            test -f "zig-out/bin/$f" && echo "OK: $f" || echo "MISSING: $f"
          done
